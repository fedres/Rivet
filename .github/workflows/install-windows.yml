name: install.ps1 (Windows)

# Sanity-test the Windows one-line installer end-to-end. The script
# regressed once on `??` (PS 7+ null-coalescing) which silently broke
# the curl/iex pattern on stock Windows PS 5.1 — this workflow catches
# that class of bug before users hit it.
#
# Runs on push to main, on PR touching the installer or this workflow,
# and weekly. Matrix covers:
#   - PowerShell 5.1 (Windows default `powershell`)
#   - PowerShell 7.x (`pwsh`, available out-of-the-box on GitHub runners)
# plus both windows-2022 and windows-2025 runner images.

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/install.ps1'
      - '.github/workflows/install-windows.yml'
  pull_request:
    paths:
      - 'bootstrap/install.ps1'
      - '.github/workflows/install-windows.yml'
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"   # Mondays 06:23 UTC

concurrency:
  group: install-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: install.ps1 / ${{ matrix.runner }} / ${{ matrix.psh }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
        # Static set: powershell = Windows-stock PS 5.1; pwsh = PS 7.x.
        # We don't put this in the step `shell:` field directly — GHA
        # validates `shell:` against a closed set at workflow-parse time
        # and rejects matrix expressions ("Unrecognized named-value:
        # 'matrix'"). Instead we host every step under pwsh (always
        # present on Windows runners) and spawn the configured shell via
        # command.
        psh: [powershell, pwsh]
        exclude:
          # windows-2025 image isn't guaranteed to ship Windows PS 5.1
          # in every configuration. windows-2022 covers the legacy gate.
          - runner: windows-2025
            psh:    powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip the LLVM toolchain download (covered by smoke.yml elsewhere
      # and would burn ~5 min per matrix leg here) and the VS Build Tools
      # check (we want to test the script itself, not the workload
      # installer). Pin to v0.2.0 so we don't depend on the GitHub API
      # nor on a "latest" release tag drifting.
      - name: Run install.ps1 from local checkout
        shell: pwsh
        env:
          RIVET_VERSION:          v0.2.0
          RIVET_HOME:             ${{ runner.temp }}\rivet-home
          RIVET_SKIP_TOOLCHAIN:   "1"
          RIVET_SKIP_VS_CHECK:    "1"
        run: |
          $psExe = "${{ matrix.psh }}"
          Write-Host "Spawning $psExe to host install.ps1"
          # Run the .ps1 file directly with -File; avoids PS 5.1/PS 7 quoting
          # discrepancies in a -Command string. Print the PS version inside
          # bootstrap/install.ps1 itself would be cleaner, but logging here
          # works without touching the user-facing script.
          & $psExe -NoProfile -ExecutionPolicy Bypass -File .\bootstrap\install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }

      - name: Verify rivet --version
        shell: pwsh
        env:
          RIVET_HOME: ${{ runner.temp }}\rivet-home
        run: |
          $exe = Join-Path $env:RIVET_HOME "bin\rivet.exe"
          if (-not (Test-Path $exe)) { throw "rivet.exe not at $exe" }
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "rivet --version exited $LASTEXITCODE" }

      # The canonical user-facing path: `iex (irm $url)`. Hits the same
      # network surface as the documented one-liner; catches "the install
      # endpoint stopped working" even when the local file invocation
      # succeeded.
      - name: Run install.ps1 via irm | iex (one-liner)
        shell: pwsh
        env:
          RIVET_VERSION:          v0.2.0
          RIVET_HOME:             ${{ runner.temp }}\rivet-home-irm
          RIVET_SKIP_TOOLCHAIN:   "1"
          RIVET_SKIP_VS_CHECK:    "1"
        run: |
          $psExe = "${{ matrix.psh }}"
          $sha   = "${{ github.sha }}"
          $url   = "https://raw.githubusercontent.com/${{ github.repository }}/$sha/bootstrap/install.ps1"
          Write-Host "Fetching $url via $psExe"
          # Stage the iex pattern in a wrapper .ps1 we tell the matrix shell
          # to execute with -File. Keeps backtick-escape semantics out of
          # the picture entirely (PS 5.1 and PS 7 tokenise -Command strings
          # differently).
          $wrapper = New-TemporaryFile
          Rename-Item $wrapper -NewName ($wrapper.Name + ".ps1")
          $wrapper = "$wrapper.ps1"
          @"
          `$ErrorActionPreference = 'Stop'
          `$script = Invoke-RestMethod -Uri '$url' -UseBasicParsing
          Invoke-Expression `$script
          "@ | Set-Content -Path $wrapper
          & $psExe -NoProfile -ExecutionPolicy Bypass -File $wrapper
          if ($LASTEXITCODE -ne 0) { throw "irm | iex pipeline exited $LASTEXITCODE" }
          $exe = Join-Path $env:RIVET_HOME "bin\rivet.exe"
          if (-not (Test-Path $exe)) { throw "rivet.exe not at $exe (irm/iex path)" }
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "irm/iex-installed rivet --version exited $LASTEXITCODE" }
