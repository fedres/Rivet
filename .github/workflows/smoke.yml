name: Smoke (nightly)

# Exercises the full end-to-end pipeline (rivet new → add fmt → fetch → build
# → run) against a real binary on each supported runner. This catches issues
# the unit tests can't — vcpkg integration, toolchain bootstrap, real linking.
#
# Slow (~10-30 min per runner because vcpkg builds fmt from source with the
# bundled clang), so we don't gate every PR on it — runs nightly + on demand.

on:
  schedule:
    - cron: "17 5 * * *"   # 05:17 UTC daily
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            allow_failure: false
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            allow_failure: false
          - os: macos-14
            runner: macos-14
            allow_failure: false
          - os: windows-2022
            runner: windows-2022
            allow_failure: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Build rivet (release) ──────────────────────────────────────────
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc-13 g++-13 clang-14 \
            libseccomp-dev libssl-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-13

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure rivet
        run: cmake --preset release

      - name: Build rivet
        run: cmake --build --preset release --parallel

      # ── Run smoke test ─────────────────────────────────────────────────
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: python tests/smoke/hello_fmt.py build/release/rivet

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: python tests/smoke/hello_fmt.py build/release/rivet.exe

      # ── M1 acceptance: rivet builds itself from rivet.toml ─────────────
      # The cmake-built rivet binary above takes its own rivet.toml at the
      # repo root and produces a second rivet binary, without invoking cmake.
      # Uses the toolchain already installed by the previous smoke step.
      - name: M1 self-build (rivet builds rivet, Unix)
        if: runner.os != 'Windows'
        continue-on-error: ${{ matrix.allow_failure }}
        env:
          RIVET_HOME: ${{ runner.temp }}/rivet-self-home
        run: |
          mkdir -p "$RIVET_HOME"
          # Reuse the toolchain that the smoke script already downloaded
          # in its own tmpdir? It's gone now — install fresh here. Cheap
          # because the bundle is cached at the runner-image level.
          ./build/release/rivet toolchain install 19.1.7
          ./build/release/rivet build
          ls -la .rivet/build/debug/bin/rivet
          # The newly-rivet-built rivet binary should respond to --version
          # without crashing.
          ./.rivet/build/debug/bin/rivet --version

      - name: M1 self-build (rivet builds rivet, Windows)
        if: runner.os == 'Windows'
        continue-on-error: ${{ matrix.allow_failure }}
        env:
          RIVET_HOME: ${{ runner.temp }}\rivet-self-home
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RIVET_HOME | Out-Null
          .\build\release\rivet.exe toolchain install 19.1.7
          if ($LASTEXITCODE -ne 0) { throw "toolchain install failed" }
          .\build\release\rivet.exe build
          if ($LASTEXITCODE -ne 0) { throw "rivet build failed" }
          $Bin = ".\.rivet\build\debug\bin\rivet.exe"
          if (-not (Test-Path $Bin)) { throw "rivet binary not produced at $Bin" }
          & $Bin --version
          if ($LASTEXITCODE -ne 0) { throw "self-built rivet --version exited $LASTEXITCODE" }

      # ── M2 acceptance: rivet drives an external CMake project ──────────
      # Scaffold a minimal cmake project (no rivet.toml), run `rivet build`
      # in its directory, expect the cmake-driving path to compile + link
      # the binary using the bundled clang + ninja.
      - name: M2 cmake-drive (rivet builds a cmake project, Unix)
        if: runner.os != 'Windows'
        continue-on-error: ${{ matrix.allow_failure }}
        env:
          RIVET_HOME: ${{ runner.temp }}/rivet-cmake-home
        run: |
          set -eux
          mkdir -p "$RIVET_HOME"
          ./build/release/rivet toolchain install 19.1.7
          DEMO="$(mktemp -d)/cmake-demo"
          mkdir -p "$DEMO"
          # Simple cmake-only project (no rivet.toml).
          cat > "$DEMO/CMakeLists.txt" <<'CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(cmake_demo LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          add_executable(cmake_demo main.cpp)
          CMAKE
          cat > "$DEMO/main.cpp" <<'CPP'
          #include <iostream>
          int main() { std::cout << "hello from cmake-driven rivet\n"; return 0; }
          CPP
          cd "$DEMO"
          "$GITHUB_WORKSPACE/build/release/rivet" build
          BIN="$(find .rivet/cmake -maxdepth 4 -type f -name cmake_demo | head -1)"
          test -n "$BIN" || { echo "binary not produced"; ls -la .rivet/cmake; exit 1; }
          OUT="$($BIN)"
          test "$OUT" = "hello from cmake-driven rivet"

      # Bigger M2 case: rivet.toml + CMakeLists.txt + find_package(fmt).
      # Exercises the [build] system = "cmake" dispatch, the per-project
      # vcpkg-installed CMAKE_PREFIX_PATH wiring, and the find_package
      # interception logger.
      - name: M2 cmake-drive with deps (rivet.toml + find_package, Unix)
        if: runner.os != 'Windows'
        continue-on-error: ${{ matrix.allow_failure }}
        env:
          RIVET_HOME: ${{ runner.temp }}/rivet-cmake-deps-home
        run: |
          set -eux
          mkdir -p "$RIVET_HOME"
          "$GITHUB_WORKSPACE/build/release/rivet" toolchain install 19.1.7
          DEMO="$(mktemp -d)/cmake-fmt-demo"
          mkdir -p "$DEMO" && cd "$DEMO"
          cat > rivet.toml <<'TOML'
          [package]
          name = "cmake_fmt_demo"
          version = "0.1.0"

          [build]
          system = "cmake"

          [dependencies]
          fmt = "*"
          TOML
          cat > CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(cmake_fmt_demo LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          find_package(fmt CONFIG REQUIRED)
          add_executable(cmake_fmt_demo main.cpp)
          target_link_libraries(cmake_fmt_demo PRIVATE fmt::fmt)
          CMAKE
          cat > main.cpp <<'CPP'
          #include <fmt/core.h>
          int main() { fmt::print("cmake+rivet+fmt = {}\n", 42); return 0; }
          CPP
          "$GITHUB_WORKSPACE/build/release/rivet" fetch
          "$GITHUB_WORKSPACE/build/release/rivet" build
          BIN="$(find .rivet/cmake -maxdepth 4 -type f -name cmake_fmt_demo | head -1)"
          test -n "$BIN" || { echo "binary not produced"; ls -la .rivet/cmake; exit 1; }
          OUT="$($BIN)"
          test "$OUT" = "cmake+rivet+fmt = 42"

      - name: M2 cmake-drive (rivet builds a cmake project, Windows)
        if: runner.os == 'Windows'
        continue-on-error: ${{ matrix.allow_failure }}
        env:
          RIVET_HOME: ${{ runner.temp }}\rivet-cmake-home
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RIVET_HOME | Out-Null
          .\build\release\rivet.exe toolchain install 19.1.7
          if ($LASTEXITCODE -ne 0) { throw "toolchain install failed" }
          $Demo = Join-Path $env:RUNNER_TEMP "cmake-demo-$([Guid]::NewGuid().ToString('N').Substring(0,6))"
          New-Item -ItemType Directory -Force -Path $Demo | Out-Null
          Set-Content -Path (Join-Path $Demo "CMakeLists.txt") -Value @"
          cmake_minimum_required(VERSION 3.20)
          project(cmake_demo LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          add_executable(cmake_demo main.cpp)
          "@
          Set-Content -Path (Join-Path $Demo "main.cpp") -Value @'
          #include <iostream>
          int main() { std::cout << "hello from cmake-driven rivet\n"; return 0; }
          '@
          Push-Location $Demo
          $RivetExe = Join-Path $env:GITHUB_WORKSPACE 'build\release\rivet.exe'
          & $RivetExe build
          if ($LASTEXITCODE -ne 0) { throw "rivet build (cmake-drive) failed" }
          $Bin = Get-ChildItem -Recurse -Filter cmake_demo.exe -Path .rivet\cmake | Select-Object -First 1
          if (-not $Bin) { throw "cmake_demo.exe not produced" }
          $out = & $Bin.FullName
          if ($out -notmatch 'hello from cmake-driven rivet') { throw "unexpected output: $out" }
          Pop-Location

      # ── Upload logs on failure ─────────────────────────────────────────
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.os }}-logs
          path: |
            build/release/Testing/
            /tmp/rivet-smoke-*
          if-no-files-found: ignore
