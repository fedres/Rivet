<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - RIVET</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323:wght@400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">
    
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: var(--space-lg);
        }
        
        .error-code {
            font-family: var(--font-heading);
            font-size: 8rem;
            color: var(--color-magenta);
            text-shadow: 0 0 20px var(--color-magenta);
            margin-bottom: var(--space-md);
            animation: glitch 2s infinite;
        }
        
        .error-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--color-cyan);
            text-shadow: 0 0 10px var(--color-cyan);
            margin-bottom: var(--space-md);
        }
        
        .error-message {
            font-size: 1.25rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-xl);
            max-width: 600px;
        }
        
        .error-actions {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .error-button {
            background: var(--color-surface);
            border: 2px solid var(--color-cyan);
            color: var(--color-cyan);
            padding: var(--space-md) var(--space-xl);
            border-radius: var(--radius);
            text-decoration: none;
            font-family: var(--font-body);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .error-button:hover {
            background: var(--color-cyan);
            color: var(--color-background);
            box-shadow: 0 0 15px var(--color-cyan);
            transform: translateY(-2px);
        }
        
        .error-button.primary {
            background: linear-gradient(45deg, var(--color-magenta), var(--color-purple));
            border-color: var(--color-magenta);
            color: white;
        }
        
        .error-button.primary:hover {
            background: linear-gradient(45deg, var(--color-purple), var(--color-magenta));
            box-shadow: 0 0 15px var(--color-magenta);
        }
        
        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
            }
            10% {
                transform: translate(-2px, -1px);
            }
            20% {
                transform: translate(2px, 1px);
            }
            30% {
                transform: translate(-1px, 2px);
            }
            40% {
                transform: translate(1px, -2px);
            }
            50% {
                transform: translate(-2px, 1px);
            }
            60% {
                transform: translate(2px, -1px);
            }
            70% {
                transform: translate(-1px, -2px);
            }
            80% {
                transform: translate(1px, 2px);
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="scanlines"></div>
    <div class="circuit-pattern"></div>
    
    <div class="error-container">
        <div class="error-code glitch" data-text="404">404</div>
        <h1 class="error-title">PAGE NOT FOUND</h1>
        <p class="error-message">
            The page you're looking for seems to have been vaporized into the digital void. 
            Don't worry, our dependencies are still intact!
        </p>
        
        <div class="error-actions">
            <a href="/" class="error-button primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9,22 9,12 15,12 15,22"></polyline>
                </svg>
                Return Home
            </a>
            <a href="https://github.com/rivet-lang/rivet" class="error-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                </svg>
                GitHub Repo
            </a>
        </div>
        
        <div style="margin-top: var(--space-xxl); font-size: 0.875rem; color: var(--color-text-secondary);">
            <p>Error Code: DEPENDENCY_NOT_RESOLVED</p>
            <p>Status: This page has likely been refactored into a different module.</p>
        </div>
    </div>
    
    <script>
        // Add some interactive effects to the 404 page
        document.addEventListener('DOMContentLoaded', () => {
            const errorCode = document.querySelector('.error-code');
            
            // Random glitch effect
            setInterval(() => {
                if (Math.random() < 0.3) {
                    errorCode.style.animation = 'none';
                    setTimeout(() => {
                        errorCode.style.animation = '';
                    }, 100);
                }
            }, 2000);
            
            // Add floating particles effect
            function createParticle() {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    width: 4px;
                    height: 4px;
                    background: var(--color-cyan);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: -1;
                    opacity: 0.6;
                    left: ${Math.random() * window.innerWidth}px;
                    top: ${window.innerHeight + 10}px;
                `;
                
                document.body.appendChild(particle);
                
                const duration = 3000 + Math.random() * 2000;
                const endX = parseFloat(particle.style.left) + (Math.random() - 0.5) * 100;
                
                particle.animate([
                    { transform: 'translateY(0px) translateX(0px)', opacity: 0.6 },
                    { transform: `translateY(-${window.innerHeight + 50}px) translateX(${endX - parseFloat(particle.style.left)}px)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'linear'
                }).onfinish = () => particle.remove();
            }
            
            // Create particles periodically
            setInterval(createParticle, 1000);
        });
    </script>
</body>
</html>
