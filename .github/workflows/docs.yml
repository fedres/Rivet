name: Docs

# Builds the mdBook under docs/ and deploys to GitHub Pages on every push to
# main. The book is served at https://<owner>.github.io/Rivet/

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Build book
        run: mdbook build docs

      - name: Assemble site
        # Landing page at /, mdBook output at /book/.
        # docs/site/{index.html,style.css,main.js} is the hand-written
        # terminal-themed landing; docs/book/ is the reference docs.
        run: |
          mkdir -p deploy
          cp -r docs/site/. deploy/
          mv docs/book deploy/book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
