# .github/workflows/publish-toolchain.yml
#
# Manually-dispatched workflow that mirrors upstream LLVM prebuilt releases
# into our own GitHub release tagged `toolchain-<ver>`, in the .tar.zst
# format that `rivet toolchain install` expects.
#
# Asset names on github.com/llvm/llvm-project change across releases
# (sometimes "LLVM-X-Linux-X64.tar.xz", sometimes
# "clang+llvm-X-x86_64-linux-gnu-ubuntu-18.04.tar.xz"), so this workflow
# queries the upstream release manifest and picks the first asset whose
# name matches a per-target regex. That makes it robust to LLVM's naming
# churn without us having to keep tracking it.

name: Publish LLVM Toolchain Bundle

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version (e.g. 18.1.8, 19.1.7)'
        required: true
        default: '19.1.7'
      strip_unused:
        description: 'Strip docs/static-libs to shrink the bundle'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each regex matches the assets that exist on the LLVM release page.
          # Order doesn't matter — first match wins.
          - target:   x86_64-linux-gnu
            pattern:  '^(LLVM-VERSION-Linux-X64|clang\+llvm-VERSION-x86_64-linux-gnu(-ubuntu-[0-9.]+)?)\.tar\.xz$'
          - target:   arm64-linux-gnu
            pattern:  '^(LLVM-VERSION-Linux-ARM64|clang\+llvm-VERSION-(arm64|aarch64)-linux-gnu)\.tar\.xz$'
          - target:   arm64-apple-macos
            pattern:  '^(LLVM-VERSION-macOS-ARM64|clang\+llvm-VERSION-arm64-apple-macos[0-9]*)\.tar\.xz$'
          - target:   x86_64-windows-msvc
            pattern:  '^(LLVM-VERSION-Windows-X64|clang\+llvm-VERSION-x86_64-pc-windows-msvc)\.tar\.xz$'

    steps:
      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends zstd xz-utils jq

      - name: Resolve and download upstream asset
        id: dl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          VER="${{ inputs.llvm_version }}"
          PATTERN="$(echo '${{ matrix.pattern }}' | sed "s/VERSION/$VER/g")"
          echo "Pattern for ${{ matrix.target }}: $PATTERN"

          # Pull asset names from the upstream release.
          ASSETS_JSON="$(gh api "repos/llvm/llvm-project/releases/tags/llvmorg-$VER" --jq '.assets[].name' || echo "")"
          if [ -z "$ASSETS_JSON" ]; then
            echo "::error::Cannot fetch upstream LLVM release llvmorg-$VER"
            echo "have_bundle=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATCH="$(echo "$ASSETS_JSON" | grep -E "$PATTERN" | head -n1 || true)"
          if [ -z "$MATCH" ]; then
            echo "::warning::No upstream asset matches '$PATTERN' for LLVM $VER — skipping."
            echo "Available assets:"
            echo "$ASSETS_JSON" | sed 's/^/    /'
            echo "have_bundle=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-$VER/$MATCH"
          echo "Downloading: $URL"
          curl -fSL --progress-bar -o llvm.tar.xz "$URL"
          ls -lh llvm.tar.xz
          echo "have_bundle=true" >> "$GITHUB_OUTPUT"

      - name: Extract
        if: steps.dl.outputs.have_bundle == 'true'
        run: |
          set -eu
          mkdir -p extract
          tar -xJf llvm.tar.xz -C extract --strip-components=1
          du -sh extract

      - name: Strip unused (optional)
        if: steps.dl.outputs.have_bundle == 'true' && inputs.strip_unused == 'true'
        run: |
          set -eu
          mkdir -p keep/bin
          # Keep the binaries Rivet's build engine actually uses.
          # Glob for "$tool*" so both "clang" (POSIX) and "clang.exe" (Windows)
          # are picked up. Excludes the static analyzer / sanitizer libs which
          # we don't need at install time.
          # Upstream LLVM ships tools as symlinks (e.g. `clang -> clang-19`).
          # `cp -a` preserves them as symlinks; if we then drop the target
          # binary from the loop, we ship a dangling link and `find_active`
          # silently reports "toolchain not found". `cp -aL` dereferences at
          # copy time so each destination is a real binary.
          for tool in clang clang++ clang-cl lld lld-link ld.lld ld64.lld \
                       llvm-ar llvm-lib llvm-dlltool \
                       llvm-strip llvm-ranlib llvm-nm \
                       llvm-objcopy llvm-readelf llvm-readobj llvm-objdump \
                       llvm-rc llvm-windres llvm-mt \
                       clang-scan-deps llvm-symbolizer llvm-cov llvm-cxxfilt; do
            for f in "extract/bin/$tool" "extract/bin/$tool.exe"; do
              [ -e "$f" ] && cp -aL "$f" "keep/bin/" || true
            done
          done
          # Windows distributes its DLL runtime in bin/ — grab everything there.
          for dll in extract/bin/*.dll; do
            [ -e "$dll" ] && cp -a "$dll" keep/bin/ || true
          done
          # Headers: libc++ + clang builtins.
          [ -d extract/include/c++ ] && { mkdir -p keep/include; cp -a extract/include/c++ keep/include/; } || true
          # Clang resource dir (multiple major versions may coexist).
          mkdir -p keep/lib
          [ -d extract/lib/clang ] && cp -a extract/lib/clang keep/lib/ || true
          # Runtime shared libs / import libs the linker may need.
          for pat in libc++ libc++abi libunwind libomp libclang libLTO; do
            for f in extract/lib/${pat}*; do
              [ -e "$f" ] && cp -a "$f" keep/lib/ || true
            done
          done
          # Sanity check — bail if we ended up with nothing executable.
          if [ -z "$(ls -A keep/bin 2>/dev/null)" ]; then
            echo "::error::Strip step removed all binaries — fix the tool list above."
            exit 1
          fi
          du -sh keep
          ls keep/bin
          rm -rf extract
          mv keep extract

      - name: Repack as .tar.zst
        if: steps.dl.outputs.have_bundle == 'true'
        run: |
          set -eu
          # The CLI extracts with --strip-components=1, so wrap the LLVM tree
          # in a top-level directory that strip can consume.
          STAGE="rivet-toolchain-clang-${{ inputs.llvm_version }}-${{ matrix.target }}"
          mv extract "$STAGE"
          OUT="${STAGE}.tar.zst"
          tar --zstd -cf "$OUT" "$STAGE"
          sha256sum "$OUT" > "$OUT.sha256"
          ls -lh "$OUT" "$OUT.sha256"

      - name: Upload artifact
        if: steps.dl.outputs.have_bundle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-${{ matrix.target }}
          path: |
            rivet-toolchain-clang-*.tar.zst
            rivet-toolchain-clang-*.tar.zst.sha256
          retention-days: 1

  release:
    name: Publish toolchain release
    needs: bundle
    runs-on: ubuntu-22.04
    if: always() && needs.bundle.result == 'success'
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: toolchain-*
          path: dist/
          merge-multiple: true

      - name: Verify at least one bundle was built
        run: |
          set -eu
          mkdir -p dist
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error::No bundles were produced — every target was skipped."
            echo "Check the bundle job logs for the LLVM asset naming mismatch."
            exit 1
          fi
          echo "Bundles to publish:"
          ls -lh dist/

      - name: Create/update toolchain release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain-${{ inputs.llvm_version }}
          name: LLVM Toolchain ${{ inputs.llvm_version }}
          files: |
            dist/rivet-toolchain-clang-*.tar.zst
            dist/rivet-toolchain-clang-*.tar.zst.sha256
          body: |
            ## LLVM ${{ inputs.llvm_version }} — Rivet toolchain bundles

            Repacked from the upstream LLVM release at
            https://github.com/llvm/llvm-project/releases/tag/llvmorg-${{ inputs.llvm_version }}

            Install on any supported platform:

            ```
            rivet toolchain install ${{ inputs.llvm_version }}
            ```

            ### Bundles

            | Target                  | Filename |
            |-------------------------|----------|
            | Linux x86_64            | `rivet-toolchain-clang-${{ inputs.llvm_version }}-x86_64-linux-gnu.tar.zst` |
            | Linux arm64             | `rivet-toolchain-clang-${{ inputs.llvm_version }}-arm64-linux-gnu.tar.zst` |
            | macOS arm64             | `rivet-toolchain-clang-${{ inputs.llvm_version }}-arm64-apple-macos.tar.zst` |
            | Windows x86_64          | `rivet-toolchain-clang-${{ inputs.llvm_version }}-x86_64-windows-msvc.tar.zst` |

            *(Missing rows mean upstream didn't ship that target for this version —
            check the workflow logs.)*
