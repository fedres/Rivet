# .github/workflows/publish-toolchain.yml
#
# Manually-dispatched workflow that mirrors upstream LLVM prebuilt releases
# into our own GitHub release tagged `toolchain-<ver>`, in the .tar.zst
# format that `rivet toolchain install` expects.
#
# Trigger from the Actions tab:
#   Actions → "Publish LLVM Toolchain Bundle" → Run workflow
#   → enter LLVM version (e.g. 18.1.8)
#
# After it succeeds, users on any platform can run:
#   rivet toolchain install 18.1.8
#
# The workflow does all extraction/repacking on Ubuntu (xz + zstd + tar are
# uniform there). Platform binaries are inside the upstream tarballs — we
# just rewrap them, we don't recompile anything.

name: Publish LLVM Toolchain Bundle

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version (e.g. 18.1.8, 19.1.5)'
        required: true
        default: '18.1.8'
      strip_unused:
        description: 'Strip docs/static-libs to shrink the bundle (~50% smaller)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:   x86_64-linux-gnu
            upstream: Linux-X64
          - target:   arm64-linux-gnu
            upstream: Linux-ARM64
          - target:   arm64-apple-macos
            upstream: macOS-ARM64
          - target:   x86_64-windows-msvc
            upstream: Windows-X64

    steps:
      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends zstd xz-utils

      - name: Download upstream LLVM
        id: dl
        run: |
          set -eu
          UPSTREAM_FILE="LLVM-${{ inputs.llvm_version }}-${{ matrix.upstream }}.tar.xz"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ inputs.llvm_version }}/${UPSTREAM_FILE}"
          echo "Trying: $URL"
          if curl -fsSL -o llvm.tar.xz "$URL"; then
            echo "have_bundle=true" >> "$GITHUB_OUTPUT"
            ls -lh llvm.tar.xz
          else
            echo "No upstream bundle at $URL — skipping this target."
            echo "have_bundle=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract
        if: steps.dl.outputs.have_bundle == 'true'
        run: |
          set -eu
          mkdir -p extract
          tar -xJf llvm.tar.xz -C extract --strip-components=1
          echo "Extracted size:"
          du -sh extract

      - name: Strip unused (optional)
        if: steps.dl.outputs.have_bundle == 'true' && inputs.strip_unused == 'true'
        run: |
          set -eu
          # Keep what Rivet's build engine needs:
          #   bin/{clang,clang++,clang-cl,lld,lld-link,llvm-ar,llvm-strip,clang-scan-deps,llvm-objcopy,llvm-readelf}
          #   include/c++/v1/        — libc++ headers
          #   lib/clang/<v>/         — clang builtin headers + compiler-rt
          #   lib/libc++*, lib/libc++abi*, lib/libunwind* — runtime shared libs
          mkdir -p keep/bin keep/lib

          # Keep selected binaries.
          for tool in clang clang++ clang-cl lld lld-link llvm-ar llvm-strip \
                       clang-scan-deps llvm-objcopy llvm-readelf llvm-ranlib \
                       llvm-nm llvm-objdump ld.lld ld64.lld; do
            if [ -e "extract/bin/$tool" ]; then
              cp -a "extract/bin/$tool" "keep/bin/"
            fi
          done

          # Keep libcxx + compiler-rt + clang resource dir.
          [ -d extract/include/c++ ]      && cp -a extract/include/c++ keep/include 2>/dev/null || mkdir -p keep/include && cp -a extract/include/c++ keep/include/
          # Keep all libclang_rt + clang resource directories (multiple LLVM
          # versions may live side-by-side after a major bump).
          if [ -d extract/lib/clang ]; then
            cp -a extract/lib/clang keep/lib/
          fi
          # Runtime shared libs the linker may need.
          for pat in libc++ libc++abi libunwind libomp libclang-cpp; do
            for f in extract/lib/${pat}*; do
              [ -e "$f" ] && cp -a "$f" keep/lib/ || true
            done
          done

          du -sh keep
          rm -rf extract
          mv keep extract

      - name: Repack as .tar.zst
        if: steps.dl.outputs.have_bundle == 'true'
        run: |
          set -eu
          # The CLI extracts with --strip-components=1, so wrap the LLVM tree
          # in a top-level directory it can strip cleanly.
          STAGE="rivet-toolchain-clang-${{ inputs.llvm_version }}-${{ matrix.target }}"
          mv extract "$STAGE"
          OUT="${STAGE}.tar.zst"
          tar --zstd -cf "$OUT" "$STAGE"
          sha256sum "$OUT" > "$OUT.sha256"
          ls -lh "$OUT" "$OUT.sha256"

      - name: Upload artifact
        if: steps.dl.outputs.have_bundle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-${{ matrix.target }}
          path: |
            rivet-toolchain-clang-*.tar.zst
            rivet-toolchain-clang-*.tar.zst.sha256
          retention-days: 1

  release:
    name: Publish toolchain release
    needs: bundle
    runs-on: ubuntu-22.04
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: toolchain-*
          path: dist/
          merge-multiple: true

      - name: Show what we have
        run: ls -lh dist/

      - name: Create/update toolchain release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain-${{ inputs.llvm_version }}
          name: LLVM Toolchain ${{ inputs.llvm_version }}
          files: |
            dist/rivet-toolchain-clang-*.tar.zst
            dist/rivet-toolchain-clang-*.tar.zst.sha256
          body: |
            ## LLVM ${{ inputs.llvm_version }} — Rivet toolchain bundles

            Repacked from the upstream LLVM release at
            https://github.com/llvm/llvm-project/releases/tag/llvmorg-${{ inputs.llvm_version }}

            Install on any supported platform:

            ```
            rivet toolchain install ${{ inputs.llvm_version }}
            ```

            ### Bundles

            | Target                  | Filename |
            |-------------------------|----------|
            | Linux x86_64            | `rivet-toolchain-clang-${{ inputs.llvm_version }}-x86_64-linux-gnu.tar.zst` |
            | Linux arm64             | `rivet-toolchain-clang-${{ inputs.llvm_version }}-arm64-linux-gnu.tar.zst` |
            | macOS arm64             | `rivet-toolchain-clang-${{ inputs.llvm_version }}-arm64-apple-macos.tar.zst` |
            | Windows x86_64          | `rivet-toolchain-clang-${{ inputs.llvm_version }}-x86_64-windows-msvc.tar.zst` |

            All bundles are SHA-256 checksummed. `rivet toolchain install`
            verifies the checksum automatically.

            *(Missing bundles indicate no upstream prebuilt exists for that
            target/version — re-dispatch the workflow with a different version.)*
