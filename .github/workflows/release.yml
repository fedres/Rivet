name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

# ─── Build matrix ─────────────────────────────────────────────────────────────

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────────
          - target:  linux-x86_64
            runner:  ubuntu-22.04
            os:      linux
            binary:  build/release/rivet

          - target:  linux-arm64
            runner:  ubuntu-22.04-arm  # GitHub-hosted arm64 runner
            os:      linux
            binary:  build/release/rivet

          # ── macOS ──────────────────────────────────────────────────────────────
          - target:  macos-x86_64
            runner:  macos-13           # Intel
            os:      macos
            binary:  build/release/rivet

          - target:  macos-arm64
            runner:  macos-14           # Apple Silicon
            os:      macos
            binary:  build/release/rivet

          # ── Windows ────────────────────────────────────────────────────────────
          - target:  windows-x86_64
            runner:  windows-2022
            os:      windows
            binary:  build\release\rivet.exe

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain setup ─────────────────────────────────────────────────────
      - name: Install deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-16 libssl-dev zstd

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: brew install cmake ninja zstd

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Configure
        run: cmake --preset release -DRIVET_GIT_HASH=${{ github.sha }}

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --output-on-failure

      # ── Bundle ──────────────────────────────────────────────────────────────
      - name: Bundle (POSIX)
        if: matrix.os != 'windows'
        run: |
          chmod +x ci/bundle.sh
          ci/bundle.sh "${{ matrix.binary }}" "${{ github.ref_name }}" dist/

      - name: Bundle (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          .\ci\bundle.ps1 `
            -Binary "${{ matrix.binary }}" `
            -Version "${{ github.ref_name }}" `
            -OutDir dist\

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ─── Publish release ──────────────────────────────────────────────────────────

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist/
          merge-multiple: true

      - name: List bundles
        run: ls -lh dist/

      - name: Stage installer scripts as release assets
        run: |
          cp bootstrap/install.sh  dist/install.sh
          cp bootstrap/install.ps1 dist/install.ps1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.zst
            dist/*.tar.zst.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/install.sh
            dist/install.ps1
          generate_release_notes: true
          body: |
            ## Installation

            **Linux / macOS:**
            ```sh
            curl -fsSL https://github.com/fedres/Rivet/releases/download/${{ github.ref_name }}/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://github.com/fedres/Rivet/releases/download/${{ github.ref_name }}/install.ps1 | iex
            ```

            ## Bundles

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64  | `rivet-${{ github.ref_name }}-linux-x86_64.tar.zst` |
            | Linux arm64   | `rivet-${{ github.ref_name }}-linux-arm64.tar.zst` |
            | macOS x86_64  | `rivet-${{ github.ref_name }}-macos-x86_64.tar.zst` |
            | macOS arm64   | `rivet-${{ github.ref_name }}-macos-arm64.tar.zst` |
            | Windows x86_64 | `rivet-${{ github.ref_name }}-windows-x86_64.zip` |

            All bundles include SHA256 checksums. The installer verifies them automatically.
