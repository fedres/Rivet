name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: rivet-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            name: rivet-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            name: rivet-aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: |
          cd rivet/cli
          cargo build --release --target ${{ matrix.target }}

      - name: Rename Binary
        run: |
          cd rivet/target/${{ matrix.target }}/release
          mv rivet-cli ../../../${{ matrix.name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: rivet/${{ matrix.name }}
